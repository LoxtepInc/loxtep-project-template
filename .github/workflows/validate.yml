name: Validate templates

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  data-product-templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate data product JSON (ODPS + workflow_id)
        run: python3 scripts/validate-data-product-templates.py
